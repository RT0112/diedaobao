# frpc 配置文件 - 免费内网穿透
# 使用 SakuraFrp (樱花FRP) 免费方案: https://open-frp.icu/
# 注册后获取 token，创建隧道获取节点地址

# ====== 配置步骤 ======
# 1. 注册 https://open-frp.icu/ (或 https://www.natfrp.com/)
# 2. 实名认证（免费必须）
# 3. 创建隧道：TCP/HTTP 类型，本地端口 3000
# 4. 复制启动命令运行

# ====== 通用配置 ======
# 以下为 SakuraFrp 启动器格式
# 实际使用时用 SakuraFrp 面板生成的启动命令

# ====== 如果用自建 frps ======
# [common]
# server_addr = your-frps-server.com
# server_port = 7000
# token = your_token
# 
# [diedaobao-http]
# type = http
# local_ip = 127.0.0.1
# local_port = 3000
# custom_domains = diedaobao.yourdomain.com
# 
# [diedaobao-tcp]
# type = tcp
# local_ip = 127.0.0.1
# local_port = 3000
# remote_port = 13000

# ====== 推荐免费方案 ======
# 1. SakuraFrp (樱花FRP): https://open-frp.icu/
#    - 免费 3 条隧道
#    - 需实名认证
#    - 支持HTTP/TCP
#    - 节点较多
#
# 2. NatFrp: https://www.natfrp.com/
#    - 免费隧道
#    - 需实名认证
#    - 有流量限制
#
# 3. cf-v2: Cloudflare Tunnel (零信任)
#    - 完全免费，无流量限制
#    - 需要 Cloudflare 账号
#    - 需要域名（托管在CF）
#    - 最稳定但配置稍复杂
